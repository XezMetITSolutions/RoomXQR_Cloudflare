services:
  - type: web
    name: roomxqr-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run db:seed || true && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: "your-super-secret-jwt-key-production"
      - key: FRONTEND_URL
        value: "https://roomxqr.com"
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: UPLOAD_PATH
        value: "./uploads"
      - key: DATABASE_URL
        value: "postgresql://roomxqr_database_user:BDnU6U13eW124KDpKF1fSJoCvWFxuHxQ@dpg-d64hapshg0os73d7hutg-a.oregon-postgres.render.com/roomxqr_database"
      - key: DIRECT_URL
        value: "postgresql://roomxqr_database_user:BDnU6U13eW124KDpKF1fSJoCvWFxuHxQ@dpg-d64hapshg0os73d7hutg-a.oregon-postgres.render.com/roomxqr_database"
    autoDeploy: false

databases:
  - name: roomxqr-db
    databaseName: roomxqr
    user: roomxqr_user
    plan: free
