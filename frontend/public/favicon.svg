<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="modernGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#modernGrad)"/>
  
  <!-- QR Code Modern Design -->
  <g fill="white">
    <!-- Top Left Corner -->
    <rect x="18" y="18" width="24" height="24" rx="4" fill="white" opacity="0.95"/>
    <rect x="23" y="23" width="14" height="14" rx="2" fill="#2563EB"/>
    
    <!-- Top Right Corner -->
    <rect x="58" y="18" width="24" height="24" rx="4" fill="white" opacity="0.95"/>
    <rect x="63" y="23" width="14" height="14" rx="2" fill="#2563EB"/>
    
    <!-- Bottom Left Corner -->
    <rect x="18" y="58" width="24" height="24" rx="4" fill="white" opacity="0.95"/>
    <rect x="23" y="63" width="14" height="14" rx="2" fill="#2563EB"/>
    
    <!-- Center Pattern -->
    <rect x="46" y="46" width="8" height="8" rx="2" fill="white" opacity="0.9"/>
    
    <!-- Decorative Dots -->
    <circle cx="50" cy="30" r="3" fill="white" opacity="0.85"/>
    <circle cx="30" cy="50" r="3" fill="white" opacity="0.85"/>
    <circle cx="70" cy="50" r="3" fill="white" opacity="0.85"/>
    <circle cx="50" cy="70" r="3" fill="white" opacity="0.85"/>
    
    <!-- Additional Pattern Elements -->
    <rect x="58" y="58" width="8" height="8" rx="2" fill="white" opacity="0.8"/>
    <rect x="68" y="68" width="8" height="8" rx="2" fill="white" opacity="0.8"/>
    <rect x="46" y="68" width="8" height="8" rx="2" fill="white" opacity="0.8"/>
    <rect x="68" y="46" width="8" height="8" rx="2" fill="white" opacity="0.8"/>
  </g>
</svg>
