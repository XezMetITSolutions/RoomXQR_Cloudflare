<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="120" height="120" rx="26" fill="url(#bgGrad)"/>
  
  <!-- Subtle pattern overlay -->
  <rect width="120" height="120" rx="26" fill="url(#bgGrad)" opacity="0.1"/>
  
  <!-- Main QR Code Design -->
  <g filter="url(#glow)">
    <!-- Top Left Corner Block -->
    <rect x="22" y="22" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
    <rect x="28" y="28" width="16" height="16" rx="3" fill="#1E40AF"/>
    
    <!-- Top Right Corner Block -->
    <rect x="70" y="22" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
    <rect x="76" y="28" width="16" height="16" rx="3" fill="#1E40AF"/>
    
    <!-- Bottom Left Corner Block -->
    <rect x="22" y="70" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
    <rect x="28" y="76" width="16" height="16" rx="3" fill="#1E40AF"/>
    
    <!-- Center Accent -->
    <circle cx="60" cy="60" r="8" fill="white" opacity="0.9"/>
    <circle cx="60" cy="60" r="5" fill="#FBBF24"/>
    
    <!-- Decorative QR Pattern Elements -->
    <rect x="56" y="30" width="8" height="8" rx="2" fill="white" opacity="0.85"/>
    <rect x="30" y="56" width="8" height="8" rx="2" fill="white" opacity="0.85"/>
    <rect x="82" y="56" width="8" height="8" rx="2" fill="white" opacity="0.85"/>
    <rect x="56" y="82" width="8" height="8" rx="2" fill="white" opacity="0.85"/>
    
    <!-- Additional Pattern -->
    <rect x="70" y="70" width="10" height="10" rx="2" fill="white" opacity="0.8"/>
    <rect x="70" y="84" width="6" height="6" rx="1.5" fill="white" opacity="0.75"/>
    <rect x="84" y="70" width="6" height="6" rx="1.5" fill="white" opacity="0.75"/>
    
    <!-- Small accent dots -->
    <circle cx="44" cy="44" r="3" fill="white" opacity="0.7"/>
    <circle cx="76" cy="44" r="3" fill="white" opacity="0.7"/>
    <circle cx="44" cy="76" r="3" fill="white" opacity="0.7"/>
  </g>
  
  <!-- Subtle shine effect -->
  <rect x="0" y="0" width="120" height="60" rx="26" fill="url(#shine)" opacity="0.15"/>
  <defs>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>
